<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a7a9b"/>
      <stop offset="100%" stop-color="#3a5068"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="6" y="14" width="20" height="16" rx="3" fill="url(#glass)" stroke="#2a3a4a" stroke-width="1"/>
  <!-- Ink inside bottle -->
  <rect x="7" y="20" width="18" height="9" rx="2" fill="url(#ink)"/>
  <!-- Bottle neck -->
  <rect x="11" y="8" width="10" height="7" rx="1" fill="url(#glass)" stroke="#2a3a4a" stroke-width="1"/>
  <!-- Cork / cap -->
  <rect x="12" y="4" width="8" height="5" rx="1.5" fill="#b8860b" stroke="#8b6508" stroke-width="0.7"/>
  <!-- Glass highlight -->
  <rect x="9" y="15" width="3" height="10" rx="1.5" fill="white" opacity="0.25"/>
  <!-- Label -->
  <rect x="10" y="16" width="12" height="5" rx="1" fill="#f5f0e0" opacity="0.85"/>
  <text x="16" y="19.8" font-family="serif" font-size="4" fill="#1a1a3a" text-anchor="middle" font-weight="bold">INK</text>
</svg>
